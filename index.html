<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>POS Fast Food - USB + Bluetooth + PDF</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f97316">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sql.js@1.8.0/dist/sql-wasm.js"></script>
    <style>
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: all 0.2s; }
        .product-img { width: 70px; height: 70px; object-fit: cover; border-radius: 12px; background: #f3f4f6; }
        .factura-item { border-bottom: 1px dashed #ddd; padding: 8px 0; }
        #toast { transition: opacity 0.3s; z-index: 1000; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">
    <div id="app">
        <!-- Pantalla de login -->
        <div id="loginScreen" class="fixed inset-0 bg-gray-800 bg-opacity-90 flex items-center justify-center z-50">
            <div class="bg-white p-8 rounded-2xl shadow-xl w-96 text-center">
                <i class="fas fa-utensils text-5xl text-orange-500 mb-4"></i>
                <h2 class="text-2xl font-bold mb-4">POS Fast Food</h2>
                <input type="password" id="pinInput" placeholder="Contraseña (0000)" class="w-full border rounded-lg p-3 mb-4 text-center text-xl" maxlength="4">
                <button id="btnLogin" class="bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 px-6 rounded-lg w-full">Acceder</button>
                <p id="loginError" class="text-red-500 text-sm mt-2 hidden">Contraseña incorrecta</p>
            </div>
        </div>

        <!-- App principal -->
        <div id="mainApp" class="hidden">
            <nav class="bg-orange-600 text-white p-4 shadow-lg flex justify-between items-center flex-wrap gap-2">
                <h1 class="text-xl font-bold"><i class="fas fa-hamburger"></i> POS Fast Food</h1>
                <div class="space-x-2">
                    <button id="btnFacturar" class="px-4 py-2 rounded-lg bg-orange-700 hover:bg-orange-800 transition"><i class="fas fa-cash-register"></i> Facturar</button>
                    <button id="btnAdmin" class="px-4 py-2 rounded-lg bg-orange-700 hover:bg-orange-800 transition"><i class="fas fa-chart-line"></i> Admin</button>
                    <button id="btnLogout" class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-800 transition"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </div>
            </nav>
            <main id="mainContent" class="p-4"></main>
        </div>
    </div>
    <div id="toast" class="fixed bottom-4 left-4 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg hidden"></div>

    <script>
        // ---------- VARIABLES ----------
        let db = null;
        let currentView = 'facturar';
        let productos = [];
        let carrito = { items: [], total: 0 };
        let chart = null;
        let adminPassword = "0000";
        let sqlModule = null;

        // DOM elements
        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');
        const mainContent = document.getElementById('mainContent');
        const toast = document.getElementById('toast');

        function showToast(msg, isError = false) {
            toast.textContent = msg;
            toast.classList.remove('hidden', 'bg-gray-800', 'bg-red-600');
            toast.classList.add(isError ? 'bg-red-600' : 'bg-gray-800');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // ---------- PERSISTENCIA CON localStorage (CORREGIDO) ----------
        function guardarBDenLocalStorage() {
            const data = db.export();
            // Convertir Uint8Array a base64 sin usar apply (evita stack overflow)
            let binary = '';
            for (let i = 0; i < data.length; i++) {
                binary += String.fromCharCode(data[i]);
            }
            localStorage.setItem('pos_fastfood_db', btoa(binary));
        }

        async function initDatabase() {
            return new Promise(async (resolve, reject) => {
                const config = { locateFile: filename => `https://cdn.jsdelivr.net/npm/sql.js@1.8.0/dist/${filename}` };
                sqlModule = await initSqlJs(config);
                
                let dbData = null;
                const stored = localStorage.getItem('pos_fastfood_db');
                if (stored) {
                    const binary = atob(stored);
                    const array = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
                    dbData = array;
                }
                
                if (dbData) {
                    db = new sqlModule.Database(dbData);
                } else {
                    db = new sqlModule.Database();
                }
                
                // Crear tablas
                db.run(`CREATE TABLE IF NOT EXISTS configuracion (clave TEXT PRIMARY KEY, valor TEXT)`);
                db.run(`CREATE TABLE IF NOT EXISTS productos (
                    id INTEGER PRIMARY KEY AUTOINCREMENT,
                    nombre TEXT NOT NULL,
                    precio REAL NOT NULL,
                    descripcion TEXT,
                    imagen TEXT,
                    activo INTEGER DEFAULT 1
                )`);
                db.run(`CREATE TABLE IF NOT EXISTS facturas (
                    id INTEGER PRIMARY KEY AUTOINCREMENT,
                    fecha TEXT NOT NULL,
                    total REAL NOT NULL,
                    descripcion TEXT,
                    items_json TEXT
                )`);

                // Contraseña por defecto
                let passRes = db.exec("SELECT valor FROM configuracion WHERE clave='admin_pin'");
                if (passRes.length === 0 || passRes[0].values.length === 0) {
                    db.run("INSERT INTO configuracion (clave, valor) VALUES ('admin_pin', '0000')");
                    adminPassword = "0000";
                } else {
                    adminPassword = passRes[0].values[0][0];
                }

                // Productos de ejemplo si está vacío
                const countProd = db.exec("SELECT COUNT(*) FROM productos WHERE activo=1");
                if (countProd[0]?.values[0][0] === 0) {
                    const ejemplos = [
                        { nombre: "Hamburguesa Clásica", precio: 5.99, descripcion: "Lechuga, tomate, carne 150g", imagen: "" },
                        { nombre: "Papas Fritas", precio: 2.50, descripcion: "Papas corte fino", imagen: "" },
                        { nombre: "Refresco", precio: 1.99, descripcion: "Lata 355ml", imagen: "" }
                    ];
                    for (let p of ejemplos) {
                        db.run("INSERT INTO productos (nombre, precio, descripcion, imagen) VALUES (?, ?, ?, ?)",
                            [p.nombre, p.precio, p.descripcion, p.imagen]);
                    }
                }
                
                guardarBDenLocalStorage();
                cargarProductos();
                resolve();
            });
        }

        function cargarProductos() {
            const res = db.exec("SELECT id, nombre, precio, descripcion, imagen, activo FROM productos WHERE activo=1");
            if (res[0]) {
                productos = res[0].values.map(row => ({
                    id: row[0], nombre: row[1], precio: row[2], descripcion: row[3], imagen: row[4] || '', activo: row[5]
                }));
            } else {
                productos = [];
            }
        }

        // CRUD productos
        async function agregarProducto(prod) {
            db.run("INSERT INTO productos (nombre, precio, descripcion, imagen) VALUES (?, ?, ?, ?)",
                [prod.nombre, prod.precio, prod.descripcion, prod.imagen]);
            guardarBDenLocalStorage();
            cargarProductos();
            if (currentView === 'admin') renderAdmin();
        }

        async function actualizarProducto(id, prod) {
            db.run("UPDATE productos SET nombre=?, precio=?, descripcion=?, imagen=? WHERE id=?",
                [prod.nombre, prod.precio, prod.descripcion, prod.imagen, id]);
            guardarBDenLocalStorage();
            cargarProductos();
            if (currentView === 'admin') renderAdmin();
        }

        async function eliminarProducto(id) {
            db.run("UPDATE productos SET activo=0 WHERE id=?", [id]);
            guardarBDenLocalStorage();
            cargarProductos();
            if (currentView === 'admin') renderAdmin();
        }

        // CRUD facturas
        async function guardarFactura(factura) {
            const fecha = new Date().toISOString();
            const items_json = JSON.stringify(factura.items);
            db.run("INSERT INTO facturas (fecha, total, descripcion, items_json) VALUES (?, ?, ?, ?)",
                [fecha, factura.total, factura.descripcion || '', items_json]);
            guardarBDenLocalStorage();
            showToast("Factura guardada");
        }

        function obtenerFacturas(filtro = {}) {
            let query = "SELECT id, fecha, total, descripcion FROM facturas WHERE 1=1";
            const params = [];
            if (filtro.fechaDesde) {
                query += " AND fecha >= ?";
                params.push(filtro.fechaDesde + "T00:00:00.000Z");
            }
            if (filtro.fechaHasta) {
                query += " AND fecha <= ?";
                params.push(filtro.fechaHasta + "T23:59:59.999Z");
            }
            if (filtro.descripcion) {
                query += " AND descripcion LIKE ?";
                params.push(`%${filtro.descripcion}%`);
            }
            query += " ORDER BY fecha DESC";
            const res = db.exec(query, params);
            if (res[0]) return res[0].values.map(row => ({ id: row[0], fecha: row[1], total: row[2], descripcion: row[3] }));
            return [];
        }

        async function eliminarFactura(id) {
            db.run("DELETE FROM facturas WHERE id=?", [id]);
            guardarBDenLocalStorage();
            if (currentView === 'admin') renderAdmin();
        }

        async function actualizarPassword(newPass) {
            db.run("UPDATE configuracion SET valor=? WHERE clave='admin_pin'", [newPass]);
            guardarBDenLocalStorage();
            adminPassword = newPass;
            showToast("Contraseña actualizada");
        }

        // ---------- IMPRESIÓN: PDF, BLUETOOTH, USB ----------
        function imprimirPDF(factura) {
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html><head><title>Ticket POS</title>
                <style>body { font-family: monospace; padding: 20px; } .ticket { max-width: 300px; margin: auto; }</style>
                </head><body>
                <div class="ticket">
                    <center><h2>POS Fast Food</h2></center>
                    <hr><p>Fecha: ${new Date().toLocaleString()}</p><hr>
                    ${factura.items.map(i => `<p>${i.cantidad} x ${i.nombre} ........ $${i.subtotal.toFixed(2)}</p>`).join('')}
                    <hr><h3>TOTAL: $${factura.total.toFixed(2)}</h3>
                    <center>¡Gracias!</center>
                </div>
                <script>window.print();setTimeout(()=>window.close(),500);<\/script>
                </body></html>
            `);
            printWindow.document.close();
            showToast("Ticket enviado a PDF");
        }

        // --- Bluetooth (Android / Windows con BT) ---
        let bluetoothCharacteristic = null;
        async function conectarImpresoraBT() {
            if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
                showToast("Bluetooth requiere HTTPS o localhost. Usa PDF o USB en su lugar.", true);
                return false;
            }
            if (!navigator.bluetooth) {
                showToast("Web Bluetooth no soportado", true);
                return false;
            }
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
                bluetoothCharacteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
                showToast("Impresora Bluetooth conectada ✅");
                return true;
            } catch (err) {
                showToast("Error BT: " + err.message, true);
                return false;
            }
        }

        async function imprimirTicketBluetooth(factura) {
            if (!bluetoothCharacteristic) {
                const ok = await conectarImpresoraBT();
                if (!ok) return false;
            }
            const ticket = generarTextoFactura(factura);
            const encoder = new TextEncoder();
            try {
                await bluetoothCharacteristic.writeValue(encoder.encode(ticket));
                showToast("Ticket impreso por Bluetooth");
                return true;
            } catch (err) {
                showToast("Error en impresión BT", true);
                return false;
            }
        }

        // --- USB (Windows / Chrome con WebUSB) ---
        let usbDevice = null;
        let usbInterface = null;
        let usbEndpoint = null;

        async function conectarImpresoraUSB() {
            if (!navigator.usb) {
                showToast("WebUSB no es compatible en este navegador. Usa Chrome en Windows.", true);
                return false;
            }
            if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
                showToast("WebUSB requiere HTTPS o localhost. Para pruebas locales, usa 'python -m http.server' y accede por http://localhost:8000", true);
                return false;
            }
            try {
                // Solicitar dispositivo USB (filtro para impresoras térmicas genéricas)
                const device = await navigator.usb.requestDevice({
                    filters: [
                        { classCode: 7 }, // Impresoras
                        { vendorId: 0x0416, productId: 0x5011 }, // ejemplo: Bixolon
                        { vendorId: 0x0e6e } // ejemplo: SNBC
                        // Puedes dejar el filtro vacío para mostrar todos los dispositivos
                    ]
                });
                usbDevice = device;
                await device.open();
                // Encontrar la interfaz de impresora (normalmente la primera)
                const configuration = device.configurations[0];
                const iface = configuration.interfaces.find(i => i.interfaceClass === 7);
                if (!iface) throw new Error("No se encontró interfaz de impresora");
                usbInterface = iface.interfaceNumber;
                await device.claimInterface(usbInterface);
                // Buscar endpoint OUT
                const endpoint = iface.alternates[0].endpoints.find(e => e.direction === 'out');
                if (!endpoint) throw new Error("No se encontró endpoint de salida");
                usbEndpoint = endpoint.endpointNumber;
                showToast("Impresora USB conectada ✅");
                return true;
            } catch (err) {
                showToast("Error USB: " + err.message, true);
                return false;
            }
        }

        function generarTextoFactura(factura) {
            let ticket = "\x1B\x40\x1B\x61\x01"; // reset + centrar
            ticket += "POS FAST FOOD\n================\n";
            ticket += `Fecha: ${new Date().toLocaleString()}\n----------------\n`;
            factura.items.forEach(item => {
                ticket += `${item.cantidad} x ${item.nombre}\t$${item.subtotal.toFixed(2)}\n`;
            });
            ticket += `----------------\nTOTAL: $${factura.total.toFixed(2)}\n¡Gracias!\n\n\n`;
            return ticket;
        }

        async function imprimirTicketUSB(factura) {
            if (!usbDevice || !usbEndpoint) {
                const ok = await conectarImpresoraUSB();
                if (!ok) return false;
            }
            const ticket = generarTextoFactura(factura);
            const encoder = new TextEncoder();
            const data = encoder.encode(ticket);
            try {
                await usbDevice.transferOut(usbEndpoint, data);
                showToast("Ticket impreso por USB");
                return true;
            } catch (err) {
                showToast("Error en impresión USB", true);
                return false;
            }
        }

        // ---------- VISTA FACTURACIÓN ----------
        function renderFacturacion() {
            let html = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 bg-white rounded-xl shadow-md p-4">
                        <h2 class="text-2xl font-bold mb-4"><i class="fas fa-hamburger"></i> Productos</h2>
                        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                            ${productos.map(p => `
                                <div onclick="agregarAlCarrito(${p.id})" class="border rounded-xl p-2 cursor-pointer card-hover bg-gray-50">
                                    <div class="flex justify-center">${p.imagen ? `<img src="${p.imagen}" class="product-img">` : `<div class="product-img bg-gray-200 flex items-center justify-center"><i class="fas fa-utensils text-3xl text-gray-400"></i></div>`}</div>
                                    <h3 class="font-bold text-center mt-1">${p.nombre}</h3>
                                    <p class="text-center text-orange-600 font-bold">$${p.precio}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-md p-4">
                        <h2 class="text-2xl font-bold mb-4"><i class="fas fa-shopping-cart"></i> Carrito</h2>
                        <div id="carritoItems" class="max-h-96 overflow-y-auto"></div>
                        <div class="mt-4 pt-3 border-t">
                            <p class="text-xl font-bold">Total: $<span id="totalCarrito">0.00</span></p>
                            <div class="grid grid-cols-2 gap-2 mt-3">
                                <button id="btnPagarUSB" class="bg-purple-600 hover:bg-purple-700 text-white py-2 rounded-lg"><i class="fas fa-usb"></i> Ticket USB</button>
                                <button id="btnPagarBT" class="bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg"><i class="fas fa-bluetooth"></i> Ticket BT</button>
                                <button id="btnPagarPDF" class="bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg"><i class="fas fa-file-pdf"></i> Ticket PDF</button>
                            </div>
                            <div class="flex gap-2 mt-2">
                                <button id="btnConectarUSB" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white py-2 rounded-lg"><i class="fas fa-plug"></i> Conectar USB</button>
                                <button id="btnConectarBT" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white py-2 rounded-lg"><i class="fas fa-bluetooth"></i> Conectar BT</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            mainContent.innerHTML = html;
            actualizarCarritoUI();
            document.getElementById('btnPagarUSB')?.addEventListener('click', () => pagarFactura('usb'));
            document.getElementById('btnPagarBT')?.addEventListener('click', () => pagarFactura('bt'));
            document.getElementById('btnPagarPDF')?.addEventListener('click', () => pagarFactura('pdf'));
            document.getElementById('btnConectarUSB')?.addEventListener('click', conectarImpresoraUSB);
            document.getElementById('btnConectarBT')?.addEventListener('click', conectarImpresoraBT);
        }

        function agregarAlCarrito(idProd) {
            const prod = productos.find(p => p.id === idProd);
            if (!prod) return;
            const existente = carrito.items.find(i => i.id === idProd);
            if (existente) {
                existente.cantidad++;
                existente.subtotal = existente.cantidad * existente.precio;
            } else {
                carrito.items.push({ id: prod.id, nombre: prod.nombre, precio: prod.precio, cantidad: 1, subtotal: prod.precio });
            }
            carrito.total = carrito.items.reduce((s, i) => s + i.subtotal, 0);
            actualizarCarritoUI();
        }

        function eliminarDelCarrito(idx) {
            carrito.items.splice(idx, 1);
            carrito.total = carrito.items.reduce((s, i) => s + i.subtotal, 0);
            actualizarCarritoUI();
        }

        function actualizarCarritoUI() {
            const container = document.getElementById('carritoItems');
            if (!container) return;
            if (carrito.items.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center">Carrito vacío</p>';
            } else {
                container.innerHTML = carrito.items.map((item, idx) => `
                    <div class="flex justify-between items-center factura-item">
                        <span>${item.cantidad} x ${item.nombre}</span>
                        <span>$${item.subtotal.toFixed(2)}</span>
                        <button class="text-red-500" onclick="eliminarDelCarrito(${idx})"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `).join('');
            }
            document.getElementById('totalCarrito').innerText = carrito.total.toFixed(2);
        }

        async function pagarFactura(tipo = 'pdf') {
            if (carrito.items.length === 0) {
                showToast("Carrito vacío", true);
                return;
            }
            const factura = {
                items: [...carrito.items],
                total: carrito.total,
                descripcion: "Venta en local"
            };
            await guardarFactura(factura);
            let ok = false;
            if (tipo === 'usb') ok = await imprimirTicketUSB(factura);
            else if (tipo === 'bt') ok = await imprimirTicketBluetooth(factura);
            else imprimirPDF(factura);
            
            if (tipo !== 'pdf' && !ok) {
                showToast("Error en impresión. Puede intentar con PDF.", true);
            }
            carrito = { items: [], total: 0 };
            actualizarCarritoUI();
        }

        // ---------- ADMIN (igual que antes pero con corrección de stack) ----------
        function renderAdmin() {
            const facturas = obtenerFacturas({});
            const totalVentas = facturas.reduce((sum, f) => sum + f.total, 0);
            const productosCount = productos.length;
            let html = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-white p-4 rounded-xl shadow"><h3 class="text-lg font-bold">💰 Ventas Totales</h3><p class="text-3xl text-green-600">$${totalVentas.toFixed(2)}</p></div>
                    <div class="bg-white p-4 rounded-xl shadow"><h3 class="text-lg font-bold">🍔 Productos Activos</h3><p class="text-3xl text-orange-600">${productosCount}</p></div>
                    <div class="bg-white p-4 rounded-xl shadow"><h3 class="text-lg font-bold">🔐 Cambiar Contraseña</h3><input type="password" id="newPassInput" class="border rounded p-1 w-full mb-2" placeholder="Nueva PIN (4 dígitos)"><button id="btnCambiarPass" class="bg-orange-600 text-white px-3 py-1 rounded">Actualizar</button></div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow mb-6"><canvas id="ventasChart" height="100"></canvas></div>
                <div class="bg-white p-4 rounded-xl shadow mb-6">
                    <div class="flex justify-between items-center"><h2 class="text-2xl font-bold">Productos</h2><button id="btnNuevoProducto" class="bg-orange-600 text-white px-4 py-2 rounded-lg">+ Nuevo</button></div>
                    <div class="overflow-x-auto mt-4"><table class="min-w-full"><thead><tr><th>Imagen</th><th>Nombre</th><th>Precio</th><th>Descripción</th><th>Acciones</th></tr></thead><tbody id="tablaProductos"></tbody></table></div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow">
                    <h2 class="text-2xl font-bold mb-4">Facturas</h2>
                    <div class="flex flex-wrap gap-2 mb-4"><input type="date" id="filtroFecha" class="border p-2 rounded"><input type="text" id="filtroDesc" placeholder="Descripción" class="border p-2 rounded"><button id="btnBuscarFacturas" class="bg-gray-600 text-white px-4 rounded">Buscar</button></div>
                    <div id="listaFacturas"></div>
                </div>
            `;
            mainContent.innerHTML = html;
            
            // Gráfico
            const fechas = [];
            const hoy = new Date();
            for (let i = 6; i >= 0; i--) {
                let d = new Date(); d.setDate(hoy.getDate() - i); fechas.push(d.toISOString().split('T')[0]);
            }
            const ventasPorDia = fechas.map(fecha => {
                const facturasDia = obtenerFacturas({ fechaDesde: fecha, fechaHasta: fecha });
                return facturasDia.reduce((sum, f) => sum + f.total, 0);
            });
            const ctx = document.getElementById('ventasChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, { type: 'line', data: { labels: fechas, datasets: [{ label: 'Ventas ($)', data: ventasPorDia, borderColor: '#f97316' }] } });
            
            const tbody = document.getElementById('tablaProductos');
            tbody.innerHTML = productos.map(p => `
                <tr class="border-b"><td>${p.imagen ? `<img src="${p.imagen}" class="w-10 h-10 rounded-full object-cover">` : '<i class="fas fa-image text-gray-400"></i>'}</td>
                <td>${p.nombre}</td>
                <td>$${p.precio}</td>
                <td>${p.descripcion}</td>
                <td><button onclick="editarProducto(${p.id})" class="text-blue-500 mr-2"><i class="fas fa-edit"></i></button><button onclick="eliminarProducto(${p.id})" class="text-red-500"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');
            
            cargarFacturasUI(facturas);
            document.getElementById('btnNuevoProducto')?.addEventListener('click', () => mostrarModalProducto());
            document.getElementById('btnBuscarFacturas')?.addEventListener('click', () => buscarFacturasUI());
            document.getElementById('btnCambiarPass')?.addEventListener('click', async () => {
                const newPass = document.getElementById('newPassInput').value;
                if (newPass && newPass.length >= 4) await actualizarPassword(newPass);
                else showToast("Mínimo 4 dígitos", true);
            });
        }

        // Modal de producto CORREGIDO (sin stack overflow)
        function mostrarModalProducto(producto = null) {
            const esEdicion = !!producto;
            const modalHTML = `
                <div id="modalProducto" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div class="bg-white p-6 rounded-xl w-96 max-w-full">
                        <h3 class="text-xl font-bold mb-4">${esEdicion ? 'Editar' : 'Nuevo'} Producto</h3>
                        <input id="prodNombre" placeholder="Nombre" class="w-full border p-2 mb-2 rounded" value="${producto?.nombre || ''}">
                        <input id="prodPrecio" type="number" step="0.01" placeholder="Precio" class="w-full border p-2 mb-2 rounded" value="${producto?.precio || ''}">
                        <input id="prodDesc" placeholder="Descripción" class="w-full border p-2 mb-2 rounded" value="${producto?.descripcion || ''}">
                        <div class="mb-3"><label class="block text-sm">Imagen</label><input type="file" id="prodImagenFile" accept="image/*" class="w-full border p-1 rounded"></div>
                        <div id="imgPreview" class="mb-3 text-center">${producto?.imagen ? `<img src="${producto.imagen}" class="w-20 h-20 mx-auto rounded">` : ''}</div>
                        <div class="flex justify-end gap-2 mt-4">
                            <button id="cancelarModal" class="bg-gray-500 text-white px-4 py-2 rounded">Cancelar</button>
                            <button id="guardarModal" class="bg-orange-600 text-white px-4 py-2 rounded">Guardar</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            
            const fileInput = document.getElementById('prodImagenFile');
            const preview = document.getElementById('imgPreview');
            let imagenBase64Temp = producto?.imagen || '';
            
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        imagenBase64Temp = ev.target.result;
                        preview.innerHTML = `<img src="${imagenBase64Temp}" class="w-20 h-20 mx-auto rounded">`;
                    };
                    reader.readAsDataURL(file);
                } else {
                    imagenBase64Temp = producto?.imagen || '';
                    preview.innerHTML = imagenBase64Temp ? `<img src="${imagenBase64Temp}" class="w-20 h-20 mx-auto rounded">` : '';
                }
            });
            
            const guardarBtn = document.getElementById('guardarModal');
            const cancelarBtn = document.getElementById('cancelarModal');
            let saving = false;
            
            const guardarHandler = async () => {
                if (saving) return;
                saving = true;
                guardarBtn.disabled = true;
                guardarBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
                
                const nombre = document.getElementById('prodNombre').value;
                const precio = parseFloat(document.getElementById('prodPrecio').value);
                const desc = document.getElementById('prodDesc').value;
                
                if (!nombre || isNaN(precio)) {
                    showToast("Nombre y precio son obligatorios", true);
                    saving = false;
                    guardarBtn.disabled = false;
                    guardarBtn.innerHTML = 'Guardar';
                    return;
                }
                
                const prodData = { nombre, precio, descripcion: desc, imagen: imagenBase64Temp };
                try {
                    if (esEdicion) {
                        await actualizarProducto(producto.id, prodData);
                    } else {
                        await agregarProducto(prodData);
                    }
                    document.getElementById('modalProducto')?.remove();
                    if (currentView === 'admin') renderAdmin();
                    showToast(esEdicion ? "Producto actualizado" : "Producto agregado");
                } catch (error) {
                    showToast("Error al guardar", true);
                } finally {
                    saving = false;
                }
            };
            
            guardarBtn.onclick = guardarHandler;
            cancelarBtn.onclick = () => document.getElementById('modalProducto')?.remove();
        }

        function cargarFacturasUI(facturas) {
            const container = document.getElementById('listaFacturas');
            if (!container) return;
            container.innerHTML = facturas.map(f => `
                <div class="border rounded p-2 mb-2 flex justify-between items-center">
                    <div><span class="font-mono">${new Date(f.fecha).toLocaleString()}</span> - $${f.total} - ${f.descripcion || ''}</div>
                    <button onclick="eliminarFactura(${f.id})" class="text-red-500"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function buscarFacturasUI() {
            const fecha = document.getElementById('filtroFecha').value;
            const desc = document.getElementById('filtroDesc').value;
            const facturas = obtenerFacturas({ fechaDesde: fecha, fechaHasta: fecha, descripcion: desc });
            cargarFacturasUI(facturas);
        }

        // Exponer globales
        window.agregarAlCarrito = agregarAlCarrito;
        window.eliminarDelCarrito = eliminarDelCarrito;
        window.editarProducto = (id) => {
            const prod = productos.find(p => p.id === id);
            if (prod) mostrarModalProducto(prod);
        };
        window.eliminarProducto = eliminarProducto;
        window.eliminarFactura = eliminarFactura;

        // Login con Enter
        function checkLogin(pin) {
            if (pin === adminPassword) {
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                setView('facturar');
                showToast("Bienvenido");
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        const pinInput = document.getElementById('pinInput');
        const btnLogin = document.getElementById('btnLogin');
        pinInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkLogin(pinInput.value);
            }
        });
        btnLogin.onclick = () => checkLogin(pinInput.value);

        function logout() {
            loginScreen.classList.remove('hidden');
            mainApp.classList.add('hidden');
            carrito = { items: [], total: 0 };
            pinInput.value = '';
            document.getElementById('loginError').classList.add('hidden');
        }

        function setView(view) {
            currentView = view;
            if (view === 'facturar') renderFacturacion();
            else if (view === 'admin') renderAdmin();
        }

        btnFacturar.onclick = () => setView('facturar');
        btnAdmin.onclick = () => setView('admin');
        btnLogout.onclick = () => logout();

        // Inicio
        window.onload = async () => {
            await initDatabase();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(e => console.log("SW error", e));
            }
        };
    </script>
</body>
</html>
